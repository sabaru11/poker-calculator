<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker leaderboard</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* background: radial-gradient(#050505); */
    background-color: #050505;
    /* background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); */
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 10px; /* ลด padding รอบนอก */
}

h1 { 
    font-size: 1.8em; /* ลดขนาดหัวข้อลง */
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
    margin-bottom: 20px;
}

h2 { font-size: 1.3em; margin-bottom: 10px; }

/* 🏆 Container ของตาราง - ปรับให้แคบลงเล็กน้อย */
.section { 
    margin: auto;
    max-width: 850px; 
    margin-bottom: 30px; 
}

table { 
    width: 100%;
    margin: auto; 
    border-collapse: separate; 
    border-spacing: 0 4px; /* ลดระยะห่างระหว่างแถวลงครึ่งหนึ่ง */
}

th { 
    background: transparent;
    color: #888;
    text-transform: uppercase;
    font-size: 11px; /* ฟอนต์หัวตารางเล็กลง */
    letter-spacing: 1px;
    padding: 10px 8px; /* ลด padding */
}

/* แถวปกติ - ปรับให้เล็กลง */
td { 
    padding: 8px 10px; /* ลดความหนาของแถวลงอย่างชัดเจน */
    background: rgba(255,255,255,0.04);
    /* backdrop-filter: blur(5px); */
    border-top: 1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px; /* ขนาดฟอนต์ข้อมูลเล็กลงให้ดูแพง */
}

/* ทำให้ขอบตารางมน */
td:first-child { border-left: 1px solid rgba(255,255,255,0.05); border-radius: 8px 0 0 8px; }
td:last-child { border-right: 1px solid rgba(255,255,255,0.05); border-radius: 0 8px 8px 0; }

tr:hover td {
    background: rgba(255, 255, 255, 0.07);
    transition: 0.2s;
}

/* 🔥 แสงไฟวิ่งรอบช่องสำหรับ Winner Streak >= 2 เท่านั้น */
.winner-streak-glow {
    position: relative;
    background: rgba(255, 191, 0, 0.24) !important;
    /* box-shadow: inset 0 0 15px rgba(255, 87, 34, 0.1); */
    overflow: hidden;
}

/* .winner-streak-glow::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 8px;
    padding: 2px; 
    background: linear-gradient(90deg, transparent, #ff5722, #ffca28, #ff5722, transparent);
    background-size: 200% 100%;
    animation: moveGlow 10s linear infinite;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
} */

@keyframes moveGlow {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* สีของตัวเลขกำไร */
.profit-plus { color: #00e676; font-weight: bold; text-shadow: 0 0 8px rgba(0,230,118,0.2); }
.profit-minus { color: #ff5252; opacity: 0.8; }

/* ไอคอน */
/* .fire-red-anim { filter: drop-shadow(0 0 5px #ff5722); animation: scaleFire 0.6s infinite alternate; } */
/* .fire-blue-anim { filter: drop-shadow(0 0 5px #00e5ff); animation: scaleFire 0.6s infinite alternate; } */

@keyframes scaleFire {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
}

button {
    padding: 3px 8px; /* ปุ่มเล็กลง */
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255, 82, 82, 0.1);
    color: #ff5252;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover { background: #ff5252; color: #fff; }


/* ===== Modal ===== */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(4px);
}

.modal-box {
    width: 95%;
    max-width: 650px;
    max-height: 85%;
    overflow: hidden;
    background: #0d0d0d;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
}

/* Header */
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

.modal-header h2 {
    margin: 0;
    font-size: 18px;
}

/* Close button */
.close-btn {
    background: transparent;
    border: none;
    color: #aaa;
    font-size: 16px;
    cursor: pointer;
}
.close-btn:hover {
    color: #fff;
}

/* Summary */
#modalSummary {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
    color: #ccc;
}

/* Scroll list */
.modal-list {
    overflow-y: auto;
    padding: 10px 16px;
}

/* Item */
.session-card {
    padding: 10px 12px;
    margin-bottom: 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.2s;
}

.session-card:hover {
    background: rgba(255,255,255,0.06);
}

/* Row layout */
.session-top {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 6px;
}

.session-bottom {
    grid-column: 1 / -1;      /* ดันให้กินทั้ง 2 คอลัมน์ */
    text-align: center;       /* ตัวหนังสืออยู่กลาง */
    font-size: 12px;
    color: #aaa;

    display: flex;
    flex-direction: column;
    align-items: center;      /* จัดกลางแนวนอน */
    justify-content: center;

    margin-top: 6px;
}

.session-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    font-size: 12px;
}

.session-grid div {
    opacity: 0.85;
}

/* Profit */
.profit-plus { color: #00e676; }
.profit-minus { color: #ff5252; }

.session-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
}

.session-box {
    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
}

.session-left {
    border-left: 3px solid #00bfff;
}

.session-right {
    border-left: 3px solid #f1c40f;
}

.session-title {
    font-weight: bold;
    margin-bottom: 5px;
    opacity: 0.8;
}
</style>
</head>

<body>

    <!-- Popup  -->
<div id="playerModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>

        <div id="modalSummary"></div>

        <div id="modalContent" class="modal-list"></div>
    </div>
</div>
<!-- END Popup  -->

<h1>Poker Leaderboard</h1>

<div class="section">
    <div id="monthlySummary"></div>
</div>

<div class="section">
    <h3>📜 ประวัติการเล่น</h3> <div id="history"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY", 
  authDomain: "tc-poker.firebaseapp.com",
  projectId: "tc-poker",
  storageBucket: "tc-poker.firebasestorage.app",
  messagingSenderId: "374948045821",
  appId: "1:374948045821:web:c969ac7883bd665ef42f94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let history = [];
const STREAK_START_DATE = new Date("2026-04-12T00:00:00");

onSnapshot(collection(db, "sessions"), (snapshot) => {
    history = [];
    snapshot.forEach(docSnap => {
        let data = docSnap.data();
        data.id = docSnap.id;
        history.push(data);
    });
    history.sort((a,b)=> new Date(b.date) - new Date(a.date));
    renderAll();
});

function calculateStreaks() {
    let streaks = {};
    let sortedData = [...history].sort((a, b) => new Date(a.date) - new Date(b.date));

    sortedData.forEach(session => {
        const sessionDate = new Date(session.date);
        if (sessionDate < STREAK_START_DATE) return; 

        const playersInThisSession = session.players.map(p => p.name);

        session.players.forEach(p => {
            if (!streaks[p.name]) {
                streaks[p.name] = { count: 0, lastStatus: null };
            }
            let s = streaks[p.name];
            let currentStatus = (p.rank == 1) ? "win" : (p.rank == 2) ? "second" : "lose";

            if (s.lastStatus === currentStatus) {
                s.count++;
            } else {
                s.count = 1;
                s.lastStatus = currentStatus;
            }
        });

        Object.keys(streaks).forEach(playerName => {
            if (!playersInThisSession.includes(playerName)) {
                streaks[playerName] = { count: 0, lastStatus: null };
            }
        });
    });
    return streaks;
}

function getIconHtml(status, count) {
    if (count <= 0) return "";
    if (status === "win") {
        return `🔥 <small>x${count}</small>`;
    }
    if (status === "second") {
        return `❄️ <small>x${count}</small>`;
    }
    return `<small>💀 x${count}</small>`;
}


/* ===================== ✅ แก้เฉพาะฟังก์ชันนี้ ===================== */
function renderMonthlySummary() {
    let monthly = {};
    let allStreaks = calculateStreaks();

    history.forEach(session => {
        let date = new Date(session.date);
        let key = (date.getMonth()+1).toString().padStart(2,'0') + "/" + date.getFullYear();
        if (!monthly[key]) monthly[key] = {};

        session.players.forEach(p => {
            if (!monthly[key][p.name]) {
                monthly[key][p.name] = { 
                    name: p.name, 
                    displayName: p.displayName || p.name, 
                    profit: 0, 
                    kill: 0, 
                    blind: 0, 
                    pay: 0, 
                    earn: 0, 
                    first: 0, 
                    second: 0,
                    play: 0   // ✅ เพิ่ม
                };
            }
            let player = monthly[key][p.name];

            player.play += 1; // ✅ นับจำนวนครั้งที่เล่น

            player.profit += p.profit || 0;
            player.kill += p.kill || 0;
            player.blind += p.blind || 0;
            player.pay += p.pay || 0;
            player.earn += p.earn || 0;

            if (p.rank == 1) player.first++;
            if (p.rank == 2) player.second++;
        });
    });

    let html = "";
    Object.keys(monthly).forEach(month => {
        html += `<h3>📅 ${month}</h3>`;
        let arr = Object.values(monthly[month]).sort((a,b)=>b.profit - a.profit);

        html += `<table>
        <tr>
            <th>#</th>
            <th>ผู้เล่น</th>
            <th>Kill</th>
            <th>Play</th> <!-- ✅ เพิ่ม -->
            <th>Buy-in</th>
            <th>จ่าย</th>
            <th>ได้</th>
            <th>🥇</th>
            <th>🥈</th>
            <th>W/L Streak</th>
            <th>สุทธิ</th>
            <th>รายละเอียด</th>
        </tr>`;

        arr.forEach((p, i) => {
            let s = allStreaks[p.name];
            let streakIcon = (s && s.count > 0) ? getIconHtml(s.lastStatus, s.count) : "";
            let rowClass = (s && s.lastStatus === 'win' && s.count >= 2) ? 'class="winner-streak-glow"' : '';

            html += `
            <tr ${rowClass}>
                <td>${i+1}</td>
                <td><b>${p.displayName}</b></td>
                <td>${p.kill}</td>
                <td>${p.play}</td> <!-- ✅ แสดง -->
                <td>${p.blind}</td>
                <td>${p.pay}</td>
                <td>${p.earn}</td>
                <td>${p.first}</td>
                <td>${p.second}</td>
                <td>${streakIcon}</td>
                <td class="${p.profit >= 0 ? 'profit-plus' : 'profit-minus'}">
                    ${p.profit >= 0 ? '+' : ''}${p.profit}
                </td>
                <td>
                <button style="cursor:pointer;"onclick="openPlayerReport('${p.name}')">รายละเอียด</button>
                </td>
            </tr>`;
        });

        html += `</table><br>`;
    });

    document.getElementById("monthlySummary").innerHTML = html;
}

    // ${p.displayName} ||
/* ============================================================= */

function renderHistory() {
    let html = "";
    let allStreaks = calculateStreaks();

    history.forEach((session, index) => {
        let date = new Date(session.date).toLocaleString("th-TH", { dateStyle: 'short', timeStyle: 'short' });
        html += `<h3>🕒 ${date} <button onclick="deleteSession('${session.id}')">ลบ</button></h3>`;
        html += `<table><tr><th>Player</th><th>Rank</th><th>Kill</th><th>Bounty</th><th>Blind</th><th>จ่าย</th><th>ได้</th><th>W/L Streak</th><th>สุทธิ</th></tr>`;

        session.players.forEach(p => {
            let streakIcon = "";
            let s = allStreaks[p.name];
            if (index === 0 && s && s.count > 0) {
                let currentStatus = (p.rank == 1) ? "win" : (p.rank == 2) ? "second" : "lose";
                if (s.lastStatus === currentStatus) {
                    streakIcon = getIconHtml(s.lastStatus, s.count);
                }
            }
            html += `<tr>
            <td>${p.displayName || p.name}</td>
            <td>${p.rankText || p.rank}</td>
            <td>${p.kill}</td>
            <td>${p.bounty}</td>
            <td>${p.blind}</td>
            <td>${p.pay}</td>
            <td>${p.earn}</td>
            <td>${streakIcon}</td>
            <td style="color:${p.profit>=0?'#00e676':'#ff5252'}">
                ${p.profit>=0?'+':''}${p.profit}
            </td></tr>`;
        });
        html += `</table><br>`;
    });

    document.getElementById("history").innerHTML = html;
}

window.deleteSession = async function(id) {
    let pass = prompt("🔐 ใส่รหัสก่อนลบ:");
    if (pass !== "tc") return alert("❌ รหัสไม่ถูกต้อง");
    if (!confirm("ลบรายการนี้จริงไหม?")) return;
    try { await deleteDoc(doc(db, "sessions", id)); alert("🗑 ลบเรียบร้อย"); } catch (err) { alert("❌ ลบไม่ได้"); }
}

function renderAll() { 
    renderMonthlySummary(); 
    renderHistory(); 
}

// Popup Total
window.openPlayerReport = function(playerName) {

    const BOUNTY_PER_KILL = 50;
    const HEADME_VALUE = 50;

    let playerSessions = history
        .map(session => {

            let player = session.players.find(p => p.name === playerName);
            if (!player) return null;

            // 👥 โต๊ะรวม
            let totalPlayers = session.players.length;
            let totalBuyin = session.players.reduce((sum, p) => sum + (p.blind || 0), 0);

            // 🥇🥈 ดึงตัวจริง
            let first = session.players.find(p => p.rank == 1);
            let second = session.players.find(p => p.rank == 2);

            // 🔥 คำนวณแบบ "แยกใหม่ทั้งหมด"
            let headMe = (player.rank == 1) ? HEADME_VALUE : 0;
            let killEarn = (player.kill || 0) * BOUNTY_PER_KILL;

            // 💰 prize = เอา earn มาลบของแทรกออก
            let prize = (player.earn || 0) - killEarn - headMe;

            // 💸 profit จริง
            let realProfit = prize + killEarn + headMe - (player.pay || 0);

            // 🔥 IMPORTANT: แก้สรุปโต๊ะ (ห้ามใช้ earn เดิม)
            let firstPrize = first
                ? (first.earn || 0) - ((first.kill || 0) * BOUNTY_PER_KILL) - HEADME_VALUE
                : 0;

            let secondPrize = second
                ? (second.earn || 0) - ((second.kill || 0) * BOUNTY_PER_KILL)
                : 0;

            return {
                date: session.date,
                ...player,

                totalPlayers,
                totalBuyin,

                firstPrize,
                secondPrize,

                prize,
                killEarn,
                headMe,
                realProfit
            };
        })
        .filter(x => x !== null)
        .sort((a,b)=> new Date(b.date) - new Date(a.date));

    let totalProfit = 0;
    let html = "";

    playerSessions.forEach(s => {

        let date = new Date(s.date).toLocaleString("th-TH", {
            dateStyle: 'short',
            timeStyle: 'short'
        });

        totalProfit += s.realProfit || 0;

        html += `
        <div class="session-card">

            <div class="session-top">
                <div>🕒 ${date}</div>
                <div class="${s.realProfit>=0?'profit-plus':'profit-minus'}">
                    ${s.realProfit>=0?'+':''}${s.realProfit}
                </div>
            </div>

            <div class="session-split">

                <!-- 👤 ของเรา -->
                <div class="session-box session-left">
                    <div class="session-title">👤 ของเรา</div>

                    🏆 Rank: ${s.rankText || s.rank}<br>
                    🎲 Buy-in: ${s.blind}<br>
                    💀 Kill: ${s.kill} ( ${s.bounty} )<br>
                    💸 จ่าย: ${s.pay}<br>
                </div>

                <!-- 📊 สรุปโต๊ะ -->
                <div class="session-box session-right">
                    <div class="session-title">📊 สรุปโต๊ะ</div>

                    👥 ผู้เล่น: ${s.totalPlayers} คน<br>
                    🎲 Buy-in รวม: ${s.totalBuyin}<br><br>

                    🥇 ที่1 : ${s.firstPrize}<br>
                    🥈 ที่2 : ${s.secondPrize}<br><br>
                                        
                </div>

                <div class="session-bottom">
                    🏆 ได้รับ --> ${s.prize} || 💀จำนวนฆ่า: ${s.killEarn} || 🙂ค่าหัวตัวเอง: ${s.headMe}<br>
                    💸 ${s.prize} + ${s.killEarn} + ${s.headMe} - ${s.pay} = ${s.realProfit>=0?'+':''}${s.realProfit}
                </div>

            </div>

        </div>
        `;
    });

    document.getElementById("modalSummary").innerHTML = `
        💰 รวมทั้งหมด: 
        <b class="${totalProfit>=0?'profit-plus':'profit-minus'}">
            ${totalProfit>=0?'+':''}${totalProfit}
        </b>
    `;

    document.getElementById("modalTitle").innerText = playerName;
    document.getElementById("modalContent").innerHTML = html;
    document.getElementById("playerModal").style.display = "flex";
};

window.closeModal = function() {
    document.getElementById("playerModal").style.display = "none";
};

// ✅ คลิกพื้นหลังเพื่อปิด
document.getElementById("playerModal").addEventListener("click", function(e) {
    if (e.target.id === "playerModal") {
        closeModal();
    }
});

</script>
</body>
</html>
