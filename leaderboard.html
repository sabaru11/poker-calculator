<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker leaderboard</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}
h2, h3 { margin-top: 20px; }
table { margin: auto; border-collapse: collapse; }
th, td { padding: 8px 12px; }
th { background: #222; }
.section { margin-bottom: 40px; }
button {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
}
.btn-delete { background: #ff5252; color: white; }
</style>
</head>

<body>

<h1>📺 Poker Leaderboard</h1>

<div class="section">
    <div id="monthlySummary"></div>
</div>

<div style="margin-bottom:10px;">
    📅 เลือกวันที่:
    <select id="dateSelect" onchange="jumpToDate()">
        <option value="">-- เลือกวันที่ --</option>
    </select>
</div>

<div class="section">
    <h2>📜 ประวัติการเล่น</h2>
    <div id="history"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔥 config ของคุณ
const firebaseConfig = {
  apiKey: "AIzaSyCWAl-0DMtprO2UvUQZIXa6GqjWqq-9F38",
  authDomain: "tc-poker.firebaseapp.com",
  projectId: "tc-poker",
  storageBucket: "tc-poker.firebasestorage.app",
  messagingSenderId: "374948045821",
  appId: "1:374948045821:web:c969ac7883bd665ef42f94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let history = [];

// ==========================
// 🔥 REALTIME LOAD
// ==========================
onSnapshot(collection(db, "sessions"), (snapshot) => {

    history = [];

    snapshot.forEach(docSnap => {
        let data = docSnap.data();
        data.id = docSnap.id;
        history.push(data);
    });

    // เรียงใหม่
    history.sort((a,b)=> new Date(b.date) - new Date(a.date));

    renderAll();
});

// ==========================
// 📅 DROPDOWN
// ==========================
function renderDateDropdown() {
    let select = document.getElementById("dateSelect");

    let html = `<option value="">-- เลือกวันที่ --</option>`;

    history.forEach(session => {
        let date = new Date(session.date).toLocaleString("th-TH");
        let id = "session_" + session.date;
        html += `<option value="${id}">${date}</option>`;
    });

    select.innerHTML = html;
}

window.jumpToDate = function() {
    let id = document.getElementById("dateSelect").value;
    if (!id) return;

    let el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
}

// ==========================
// 🔥 MONTHLY SUMMARY
// ==========================
function renderMonthlySummary() {

    let monthly = {};

    history.forEach(session => {

        let date = new Date(session.date);
        let key = (date.getMonth()+1).toString().padStart(2,'0') 
                + "/" + date.getFullYear();

        if (!monthly[key]) monthly[key] = {};

        session.players.forEach(p => {

            if (!monthly[key][p.name]) {
                monthly[key][p.name] = {
                    displayName: p.displayName || p.name,
                    profit: 0, kill: 0, blind: 0,
                    pay: 0, earn: 0, first: 0, second: 0
                };
            }

            let player = monthly[key][p.name];

            player.profit += p.profit || 0;
            player.kill += p.kill || 0;
            player.blind += p.blind || 0;
            player.pay += p.pay || 0;
            player.earn += p.earn || 0;

            if (p.rank == 1) player.first++;
            if (p.rank == 2) player.second++;
        });
    });

    let html = "";

    Object.keys(monthly).sort((a,b)=>{
        let [ma,ya] = a.split('/');
        let [mb,yb] = b.split('/');
        return new Date(yb,mb-1) - new Date(ya,ma-1);
    }).forEach(month => {

        html += `<h3>📅 ${month}</h3>`;

        let arr = Object.values(monthly[month]);
        arr.sort((a,b)=>b.profit - a.profit);

        html += `<table style="min-width:900px;">`;
        html += `
        <tr>
            <th>อันดับ</th><th>ผู้เล่น</th><th>Kill</th>
            <th>Blind</th><th>จ่าย</th><th>ได้</th>
            <th>🥇</th><th>🥈</th><th>สุทธิ</th>
        </tr>`;

        arr.forEach((p,i)=>{
            html += `
            <tr>
                <td>${i+1}</td>
                <td>${p.displayName}</td>
                <td>${p.kill}</td>
                <td>${p.blind}</td>
                <td>${p.pay}</td>
                <td>${p.earn}</td>
                <td>${p.first}</td>
                <td>${p.second}</td>
                <td style="color:${p.profit>=0?'#00e676':'#ff5252'}">
                    ${p.profit>=0?'+':''}${p.profit}
                </td>
            </tr>`;
        });

        html += `</table><br>`;
    });

    document.getElementById("monthlySummary").innerHTML = html;
}

// ==========================
// 📜 HISTORY
// ==========================
function renderHistory() {

    let html = "";

    history.forEach(session => {

        let date = new Date(session.date).toLocaleString("th-TH");
        let sessionId = "session_" + session.date;

        html += `
        <h3 id="${sessionId}">
            🕒 ${date}
            <button class="btn-delete" onclick="deleteSession('${session.id}')">ลบ</button>
        </h3>
        `;

        html += `<table style="min-width:700px;">`;
        html += `
        <tr>
            <th>Player</th><th>Rank</th><th>Kill</th>
            <th>Bounty</th><th>Blind</th>
            <th>จ่าย</th><th>ได้</th><th>สุทธิ</th>
        </tr>`;

        session.players.forEach(p=>{
            html += `
            <tr>
                <td>${p.displayName || p.name}</td>
                <td>${p.rankText || p.rank}</td>
                <td>${p.kill}</td>
                <td>${p.bounty}</td>
                <td>${p.blind}</td>
                <td>${p.pay}</td>
                <td>${p.earn}</td>
                <td style="color:${p.profit>=0?'#00e676':'#ff5252'}">
                    ${p.profit>=0?'+':''}${p.profit}
                </td>
            </tr>`;
        });

        html += `</table><br>`;
    });

    document.getElementById("history").innerHTML = html;
}

// ==========================
// 🗑 ลบ
// ==========================
window.deleteSession = async function(id) {

    let pass = prompt("🔐 ใส่รหัสก่อนลบ:");

    if (!pass) return;

    if (pass !== "poker123") {
        alert("❌ รหัสไม่ถูกต้อง");
        return;
    }

    if (!confirm("ลบรายการนี้จริงไหม?")) return;

    try {
        await deleteDoc(doc(db, "sessions", id));
        alert("🗑 ลบเรียบร้อย");
    } catch (err) {
        alert("❌ ลบไม่ได้ (ไม่มีสิทธิ์)");
        console.error(err);
    }
}

// ==========================
function renderAll() {
    renderMonthlySummary();
    renderHistory();
    renderDateDropdown();
}

</script>

</body>
</html>
