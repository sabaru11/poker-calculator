<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker leaderboard</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

h2, h3 {
    margin-top: 20px;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    padding: 8px 12px;
}

th {
    background: #222;
}

.section {
    margin-bottom: 40px;
}

button {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
}

.btn-delete {
    background: #ff5252;
    color: white;
}

.btn-month {
    background: orange;
    color: black;
}
</style>
</head>

<body>

<h1>📺 Poker Leaderboard</h1>

<!-- 🔥 Monthly Summary -->
<div class="section">
    <h2>📊 สรุปกำไร / ขาดทุน รายเดือน</h2>
    <div id="monthlySummary"></div>
</div>

<!-- 🔥 Dropdown เลือกวัน -->
<div style="margin-bottom:10px;">
    📅 เลือกวันที่:
    <select id="dateSelect" onchange="jumpToDate()">
        <option value="">-- เลือกวันที่ --</option>
    </select>
</div>

<!-- 🔥 History -->
<div class="section">
    <h2>📜 ประวัติการเล่น</h2>
    <div id="history"></div>
</div>

<script>

// ==========================
// 🗑 ลบ session
// ==========================
function deleteSession(index) {
    if (!confirm("❗ ต้องการลบรายการนี้จริงไหม?")) return;

    let history = JSON.parse(localStorage.getItem("pokerHistory") || "[]");

    history.splice(index, 1);

    localStorage.setItem("pokerHistory", JSON.stringify(history));

    renderAll();
}

// ==========================
// 🗑 ลบทั้งเดือน
// ==========================
function deleteMonth(monthKey) {
    if (!confirm("🔥 ลบข้อมูลทั้งเดือนนี้จริงไหม?")) return;

    let history = JSON.parse(localStorage.getItem("pokerHistory") || "[]");

    history = history.filter(session => {
        let d = new Date(session.date);
        let key = (d.getMonth()+1).toString().padStart(2,'0') + "/" + d.getFullYear();
        return key !== monthKey;
    });

    localStorage.setItem("pokerHistory", JSON.stringify(history));

    renderAll();
}

// ==========================
// 📅 DROPDOWN
// ==========================
function renderDateDropdown() {

    let history = JSON.parse(localStorage.getItem("pokerHistory") || "[]");

    let select = document.getElementById("dateSelect");

    let html = `<option value="">-- เลือกวันที่ --</option>`;

    history.slice().reverse().forEach(session => {

        let date = new Date(session.date).toLocaleString("th-TH");
        let id = "session_" + session.date;

        html += `<option value="${id}">${date}</option>`;
    });

    select.innerHTML = html;
}

function jumpToDate() {

    let id = document.getElementById("dateSelect").value;

    if (!id) return;

    let el = document.getElementById(id);

    if (el) {
        el.scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    }
}

// ==========================
// 🔥 MONTHLY SUMMARY
// ==========================
function renderMonthlySummary() {

    let history = JSON.parse(localStorage.getItem("pokerHistory") || "[]");

    let monthly = {};

    history.forEach(session => {

        let date = new Date(session.date);

        let key = (date.getMonth()+1).toString().padStart(2,'0') 
                + "/" + date.getFullYear();

        if (!monthly[key]) {
            monthly[key] = {};
        }

        session.players.forEach(p => {

            let name = p.name;

            if (!monthly[key][name]) {
                monthly[key][name] = {
                    displayName: p.displayName || p.name,
                    profit: 0,
                    kill: 0,
                    blind: 0,
                    pay: 0,
                    earn: 0,
                    first: 0,
                    second: 0
                };
            }

            let player = monthly[key][name];

            player.profit += p.profit || 0;
            player.kill += p.kill || 0;
            player.blind += p.blind || 0;
            player.pay += p.pay || 0;
            player.earn += p.earn || 0;

            let rank = Number(p.rank) || 0;

            if (rank === 1) player.first++;
            if (rank === 2) player.second++;
        });
    });

    let html = "";

    let months = Object.keys(monthly).sort((a,b)=>{
        let [ma,ya] = a.split('/');
        let [mb,yb] = b.split('/');
        return new Date(yb,mb-1) - new Date(ya,ma-1);
    });

    months.forEach(month => {

        html += `<h3>📅 ${month}
        <button class="btn-month" onclick="deleteMonth('${month}')">ลบทั้งเดือน</button>
        </h3>`;

        let arr = Object.values(monthly[month]);

        arr.sort((a,b)=>b.profit - a.profit);

        html += `
        <table style="margin-bottom:20px; min-width:900px;">
        <tr>
            <th>อันดับ</th>
            <th>ผู้เล่น</th>
            <th>🔫 Kill</th>
            <th>🎯 Blind</th>
            <th>💸 จ่าย</th>
            <th>💰 ได้</th>
            <th>🥇 1st</th>
            <th>🥈 2nd</th>
            <th>📈 สุทธิ</th>
        </tr>
        `;

        arr.forEach((p,i)=>{

            html += `
            <tr style="background:${i%2==0 ? '#111' : '#1a1a1a'};">
                <td>${i+1}</td>
                <td>${p.displayName}</td>
                <td>${p.kill}</td>
                <td>${p.blind}</td>
                <td>${p.pay}</td>
                <td>${p.earn}</td>
                <td>${p.first}</td>
                <td>${p.second}</td>
                <td style="color:${p.profit >= 0 ? '#00e676' : '#ff5252'}">
                    ${p.profit >= 0 ? '+' : ''}${p.profit}
                </td>
            </tr>
            `;
        });

        html += `</table>`;
    });

    document.getElementById("monthlySummary").innerHTML = html;
}

// ==========================
// 🔥 HISTORY TABLE
// ==========================
function renderHistory() {

    let history = JSON.parse(localStorage.getItem("pokerHistory") || "[]");

    let html = "";

    history.slice().reverse().forEach((session,reverseIndex) => {

        let realIndex = history.length - 1 - reverseIndex;
        let date = new Date(session.date).toLocaleString("th-TH");
        let sessionId = "session_" + session.date;

        html += `
        <h3 id="${sessionId}">🕒 ${date}
        <button class="btn-delete" onclick="deleteSession(${realIndex})">ลบ</button>
        </h3>
        `;

        html += `
        <table style="margin-bottom:30px; min-width:700px;">
        <tr>
            <th>Player</th>
            <th>Rank</th>
            <th>Kill</th>
            <th>💰 Bounty</th>
            <th>Blind</th>
            <th>จ่าย</th>
            <th>ได้</th>
            <th>สุทธิ</th>
        </tr>
        `;

        session.players.forEach((p,i)=>{

            html += `
            <tr style="background:${i%2==0 ? '#111' : '#1a1a1a'};">
                <td>${p.displayName || p.name}</td>
                <td>${p.rankText || p.rank}</td>
                <td>${p.kill}</td>
                <td>${p.bounty}</td>
                <td>${p.blind}</td>
                <td>${p.pay}</td>
                <td>${p.earn}</td>
                <td style="color:${p.profit >= 0 ? '#00e676' : '#ff5252'}">
                    ${p.profit >= 0 ? '+' : ''}${p.profit}
                </td>
            </tr>
            `;
        });

        html += `</table>`;
    });

    document.getElementById("history").innerHTML = html;
}

// ==========================
// 🚀 INIT
// ==========================
function renderAll() {
    renderMonthlySummary();
    renderHistory();
    renderDateDropdown(); // 🔥 สำคัญ
}

renderAll();

// 🔄 realtime
setInterval(renderAll, 2000);

</script>

</body>
</html>
