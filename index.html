<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker HEAD50</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

.box {
    margin-top: 30px;
}

input {
    padding: 6px;
    font-size: 14px;
    width: 70px;
    text-align: center;
}

button {
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
}

/* 🔥 Grid หลัก */
#playerInputs {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* PC = 5 ช่อง */
    gap: 10px;
    max-width: 1200px;
    margin: 20px auto;
}

/* Tablet */
@media (max-width: 900px) {
    #playerInputs {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* Mobile */
@media (max-width: 500px) {
    #playerInputs {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* 🔥 Card Player */
.player {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    transition: 0.2s;
}

.player:hover {
    transform: scale(1.05);
    background: #222;
}

/* Blind */
.blind-group {
    margin-top: 5px;
}

.blind-btn {
    background: #333;
    color: #fff;
    margin: 2px;
}

.blind-btn.active {
    background: #00c853;
    color: #000;
    font-weight: bold;
}

.result {
    margin-top: 30px;
    font-size: 18px;
}
</style>

</head>

<body>

<div class="box">
    <h1>🎲 Poker HEAD 50</h1>

    <div>
        👥 จำนวนผู้เล่น <br>
        <input type="number" id="players" value="7" onchange="generatePlayers()">
    </div>

    <div id="playerInputs"></div>

    <br>
    <button onclick="calculate()">คำนวณ</button>

    <div class="result" id="output"></div>
</div>

<script>

// 🔥 เลือก Blind
function setBlind(player, value) {
    document.getElementById("blind" + player).value = value;

    let btns = document.querySelectorAll(`#p${player} .blind-btn`);
    btns.forEach(b => b.classList.remove("active"));

    btns[value].classList.add("active");
}

// 🔥 สร้าง Player
function generatePlayers() {
    let players = parseInt(document.getElementById("players").value);
    let container = document.getElementById("playerInputs");

    container.innerHTML = "";

    for (let i = 1; i <= players; i++) {
        container.innerHTML += `
            <div class="player" id="p${i}">
                
                <div><b>👤 P${i}</b></div>

                <div style="margin-top:5px;">
                    🔫 <input type="number" id="kill${i}" value="0">
                </div>

                <div class="blind-group">
                    <button class="blind-btn active" onclick="setBlind(${i},0)">0</button>
                    <button class="blind-btn" onclick="setBlind(${i},1)">1</button>
                    <button class="blind-btn" onclick="setBlind(${i},2)">2</button>
                    <button class="blind-btn" onclick="setBlind(${i},3)">3</button>
                </div>

                <input type="hidden" id="blind${i}" value="0">
            </div>
        `;
    }
}

// 🔥 คำนวณ
function calculate() {
    let players = parseInt(document.getElementById("players").value);

    let prizePool = 0;
    let bountyPool = 0;
    let dealer = 0;

    let kills = [];
    let bountyList = [];

    for (let i = 1; i <= players; i++) {

        let k = parseInt(document.getElementById("kill" + i).value) || 0;
        let blindCount = parseInt(document.getElementById("blind" + i).value) || 0;

        prizePool += 200;
        bountyPool += 50;
        dealer += 20;

        prizePool += blindCount * 200;
        bountyPool += blindCount * 50;

        kills.push(k);
        bountyList.push(k * 50);
    }

    let firstPrize = Math.ceil(prizePool * 0.7);
    let secondPrize = prizePool - firstPrize;

    let bounty1 = bountyList[0] || 0;
    let bounty2 = bountyList[1] || 0;

    let total1 = Math.ceil(firstPrize + bounty1);
    let total2 = Math.ceil(secondPrize + bounty2);

    let headtop1 = 50;

    let bountyPaid = bountyList.reduce((a,b)=>a+b,0) + headtop1;
    let bountyLeft = bountyPool - bountyPaid;
    if (bountyLeft < 0) bountyLeft = 0;

	let html = `
		💰 ค่าทัวร์: ${prizePool} บาท <br>
		🧑‍💼 Dealer: ${dealer} บาท <br><br>

		🎯 ค่าหัวทั้งหมด: ${bountyPool} บาท <br>
		🎯 แจกไป: ${bountyPaid} บาท <br>
		🎯 เหลือ: ${bountyLeft} บาท <br><br>

		🥇 <b>ที่ 1</b><br>
		เงินรางวัล: ${firstPrize} บาท<br>
		ค่าหัวตัวเอง: +${headtop1} บาท<br>
		ค่าหัวที่ฆ่าคนอื่น: +${bounty1} บาท<br>
		👉 <b>รวมทั้งหมด: ${firstPrize + headtop1 + bounty1} บาท</b><br><br>

		🥈 <b>ที่ 2</b><br>
		เงินรางวัล: ${secondPrize} บาท<br>
		ค่าหัวที่ฆ่าคนอื่น: +${bounty2} บาท<br>
		👉 <b>รวมทั้งหมด: ${secondPrize + bounty2} บาท</b><br><br>

		📊 รายละเอียด:<br>
	`;

    for (let i = 1; i <= players; i++) {
        let blindCount = parseInt(document.getElementById("blind" + i).value) || 0;
        let pay = 270 + (blindCount * 250);

        html += `Player ${i} | จ่าย: ${pay} | Kill: ${kills[i-1]} | Blind: ${blindCount}<br>`;
    }

    document.getElementById("output").innerHTML = html;
}

// โหลดครั้งแรก
generatePlayers();

</script>

</body>
</html>
