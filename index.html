<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>50 Poker || 03/04/69 TC </title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

.box {
    margin-top: 20px;
}

#playerInputs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 900px;
    margin: 20px auto;
}

@media (max-width: 600px) {
    #playerInputs {
        grid-template-columns: repeat(2, 1fr);
    }
}

.player {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px;
}

input {
    margin-top: 5px;
}

input[type="number"] {
    width: 60px;
}

input[type="text"] {
    width: 100px;
}

.rank {
    margin-top: 5px;
    font-size: 13px;
}

.blind-btn {
    background: #333;
    color: #fff;
    margin: 2px;
    border: none;
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 12px;
}

.blind-btn.active {
    background: #00c853;
    color: #000;
}

button {
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🎲 Poker HEAD50</h2>

    จำนวนผู้เล่น:
    <input type="number" id="players" value="7" onchange="generatePlayers()">

    <div id="playerInputs"></div>

    <button onclick="calculate()">คำนวณ</button>

    <div class="result" id="output"></div>
</div>

<script>

function setBlind(p, v) {
    document.getElementById("blind"+p).value = v;

    let btns = document.querySelectorAll(`#p${p} .blind-btn`);
    btns.forEach(b=>b.classList.remove("active"));
    btns[v].classList.add("active");
}

function generatePlayers() {
    let n = +document.getElementById("players").value;
    let box = document.getElementById("playerInputs");
    box.innerHTML = "";

    for (let i=1;i<=n;i++) {
        box.innerHTML += `
        <div class="player" id="p${i}">
            <b>P${i}</b><br>

            👤 <input type="text" id="name${i}" placeholder="ชื่อผู้เล่น"><br>

            🔫 <input type="number" id="kill${i}" value="0"><br>

            <div class="rank">
                <label><input type="radio" name="rank${i}" value="0" checked> -</label>
                <label><input type="radio" name="rank${i}" value="1"> 🥇</label>
                <label><input type="radio" name="rank${i}" value="2"> 🥈</label>
            </div>

            <div>
                <button class="blind-btn active" onclick="setBlind(${i},0)">0</button>
                <button class="blind-btn" onclick="setBlind(${i},1)">1</button>
                <button class="blind-btn" onclick="setBlind(${i},2)">2</button>
                <button class="blind-btn" onclick="setBlind(${i},3)">3</button>
            </div>

            <input type="hidden" id="blind${i}" value="0">
        </div>
        `;
    }
}

function calculate() {
    let n = +document.getElementById("players").value;

    let p1 = 0, p2 = 0;

    let names = [];
    let kills = [];

    let prizePool = 0;
    let dealer = 0;

    for (let i=1;i<=n;i++) {

        let name = document.getElementById("name"+i).value || ("P"+i);
        let k = +document.getElementById("kill"+i).value || 0;
        let b = +document.getElementById("blind"+i).value || 0;
        let r = document.querySelector(`input[name="rank${i}"]:checked`).value;

        if (r == 1) p1 = i;
        if (r == 2) p2 = i;

        names.push(name);
        kills.push(k);

        prizePool += 200 + (b * 200);
        dealer += 20;
    }

    if (!p1 || !p2) {
        alert("ต้องมี ที่ 1 และ ที่ 2");
        return;
    }

    let first = Math.ceil(prizePool * 0.7);
    let second = prizePool - first;
    let head = 50;

    let html = `
    <h3>🏆 สรุปผล</h3>

    🥇 <b>${names[p1-1]}</b> = ${first + head + (kills[p1-1]*50)} บาท<br>
    🥈 <b>${names[p2-1]}</b> = ${second + (kills[p2-1]*50)} บาท<br><br>

    🧑‍💼 Dealer: ${dealer} บาท<br><br>

    <h3>📊 ตารางคะแนน</h3>

    <table style="margin:auto; border-collapse: collapse; min-width: 700px;">
    <tr style="background:#222;">
        <th style="padding:10px;">Player</th>
        <th>จ่าย</th>
        <th>💀 Kill</th>
        <th>Blind</th>
        <th>💰 ผลรวม</th>
        <th>📈 ยอดสุทธิ</th>
    </tr>
    `;

    for (let i = 1; i <= n; i++) {

        let blindCount = +document.getElementById("blind" + i).value || 0;
        let pay = 270 + (blindCount * 250);

        let killMoney = (kills[i-1] || 0) * 50;
        let earn = killMoney;

        let badge = "";

        if (i === p1) {
            earn += first + head;
            badge = " 🥇";
        } 
        else if (i === p2) {
            earn += second;
            badge = " 🥈";
        }

        let profit = earn - pay;

        html += `
        <tr style="background:${i%2==0 ? '#111' : '#1a1a1a'};">
            <td style="padding:10px;">${names[i-1]}${badge}</td>

            <td>${pay}</td>

            <td>
                ${kills[i-1]} 
                <span style="color:#00e676;">(+${killMoney})</span>
            </td>

            <td>${blindCount}</td>

            <td style="color:#03a9f4;">
                ${earn}
                <div style="font-size:12px; color:#aaa; text-align:left;">
                    + Kill: ${killMoney}<br>
                    ${i === p1 ? `+ Rank1: ${first}<br>` : ""}
                    ${i === p2 ? `+ Rank2: ${second}<br>` : ""}
                    ${i === p1 ? `+ Head Me: ${head}<br>` : ""}
                    - Buy-in: ${pay}
                </div>
            </td>

            <td style="font-weight:bold; color:${profit >= 0 ? '#00e676' : '#ff5252'}">
                ${profit >= 0 ? '+' : ''}${profit}
            </td>
        </tr>
        `;
    }

    html += `</table>`;

    document.getElementById("output").innerHTML = html;
}

generatePlayers();

</script>

</body>
</html>
