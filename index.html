<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>50 Poker || 03/04/69 TC </title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

.box {
    margin-top: 20px;
}

#playerInputs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 900px;
    margin: 20px auto;
}

@media (max-width: 600px) {
    #playerInputs {
        grid-template-columns: repeat(2, 1fr);
    }
}

.player {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px;
}

input {
    margin-top: 5px;
}

input[type="number"] {
    width: 60px;
}

input[type="text"] {
    width: 100px;
}

.rank {
    margin-top: 5px;
    font-size: 13px;
}

.blind-btn {
    background: #333;
    color: #fff;
    margin: 2px;
    border: none;
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 12px;
}

.blind-btn.active {
    background: #00c853;
    color: #000;
}

button {
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.result {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🎲 Poker CAL 50 || 03/04/69 </h2>

    จำนวนผู้เล่น:
    <input type="number" id="players" value="7" onchange="generatePlayers()">

    <div id="playerInputs"></div>

    <button onclick="calculate()">คำนวณ</button>
    <button onclick="saveData()">💾 Save</button>

    <div class="result" id="output"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { 
        getFirestore, 
        collection, 
        addDoc 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyCWAl-0DMtprO2UvUQZIXa6GqjWqq-9F38",
      authDomain: "tc-poker.firebaseapp.com",
      projectId: "tc-poker",
      storageBucket: "tc-poker.firebasestorage.app",
      messagingSenderId: "374948045821",
      appId: "1:374948045821:web:c969ac7883bd665ef42f94",
      measurementId: "G-3ZFVVQ2KJG"
    };
    
    // init
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    
    // 👇 สำคัญมาก: ส่ง db ไป global
    window.db = db;
    window.fbAddDoc = addDoc;
    window.fbCollection = collection;
</script>
    
<script>

function setBlind(p, v) {
    document.getElementById("blind"+p).value = v;

    let btns = document.querySelectorAll(`#p${p} .blind-btn`);
    btns.forEach(b=>b.classList.remove("active"));
    btns[v].classList.add("active");
}

function generatePlayers() {
    let n = +document.getElementById("players").value;
    let box = document.getElementById("playerInputs");
    box.innerHTML = "";

    for (let i=1;i<=n;i++) {
        box.innerHTML += `
        <div class="player" id="p${i}">
            <b>P${i}</b><br>

            👤 <input type="text" id="name${i}" placeholder="ชื่อผู้เล่น"><br>

            🔫 <input type="number" id="kill${i}" value="0"><br>

            <div class="rank">
                <label><input type="radio" name="rank${i}" value="0" checked> -</label>
                <label><input type="radio" name="rank${i}" value="1"> 🥇</label>
                <label><input type="radio" name="rank${i}" value="2"> 🥈</label>
            </div>

            <div>
                <button class="blind-btn active" onclick="setBlind(${i},0)">0</button>
                <button class="blind-btn" onclick="setBlind(${i},1)">1</button>
                <button class="blind-btn" onclick="setBlind(${i},2)">2</button>
                <button class="blind-btn" onclick="setBlind(${i},3)">3</button>
            </div>

            <input type="hidden" id="blind${i}" value="0">
        </div>
        `;
    }
}

function calculate() {
    let n = +document.getElementById("players").value;

    let p1 = 0, p2 = 0;

    let names = [];
    let kills = [];

    let prizePool = 0;

    let tableFee = 0;
    let bountyTotal = 0;
    let dealerTotal = 0;

    for (let i=1;i<=n;i++) {

        let name = document.getElementById("name"+i).value || ("P"+i);
        let k = +document.getElementById("kill"+i).value || 0;
        let b = +document.getElementById("blind"+i).value || 0;
        let r = document.querySelector(`input[name="rank${i}"]:checked`).value;

        if (r == 1) p1 = i;
        if (r == 2) p2 = i;

        names.push(name);
        kills.push(k);

        prizePool += 200 + (b * 200);

        // 💰 ค่าโต๊ะ
        tableFee += 200 + (b * 200);

        // 🎯 ค่าหัว
        bountyTotal += 50 + (b * 50);

        // 🎲 ค่า dealer (ไม่นับ buy-in)
        dealerTotal += 20;
    }

    if (!p1 || !p2) {
        alert("ต้องมี ที่ 1 และ ที่ 2");
        return;
    }

    let first = Math.ceil(prizePool * 0.7);
    let second = prizePool - first;
    let head = 50;

    let html = `<h3>🏆 สรุปผล</h3>`;

    html += `
    <table style="margin:auto; min-width:700px;">
    <tr>
        <th>Player</th>
        <th>Rank</th>
        <th>Kill</th>
        <th>💰 Bounty</th>
        <th>Blind-in</th>
        <th>จ่าย</th>
        <th>คำนวน</th>
        <th>รายได้</th>
        <th>ยอดสุทธิ</th>
    </tr>
    `;

    for (let i = 1; i <= n; i++) {

        let dealer = 20;
        let blindCount = +document.getElementById("blind" + i).value || 0;
        let pay = 270 + (blindCount * 250) + dealer;

        let killMoney = kills[i-1] * 50;
        let bounty = killMoney;

        let earn = killMoney;

        let rankText = "-";

        if (i === p1) {
            earn += first + head;
            rankText = "🥇";
        } 
        else if (i === p2) {
            earn += second;
            rankText = "🥈";
        }

        let profit = earn - pay;

        html += `
        <tr style="background:${i%2==0 ? '#111' : '#1a1a1a'};">
            <td>${names[i-1]}</td>
            <td>${rankText}</td>
            <td>${kills[i-1]}</td>
            <td>${bounty}</td>
            <td>${blindCount}</td>
            <td>${pay}</td>

            <td style="padding: 10px;">
                <div style="font-size:12px; color:#aaa; text-align:left;">
                ${i === p1 ? `<span style="color:gold;">+ Rank1: ${first}</span><br>` : ""}
                ${i === p2 ? `<span style="color:cyan;">+ Rank2: ${second}</span><br>` : ""}
                + Kill: ${killMoney}<br>
                ${i === p1 ? `+ Head Me: ${head}<br>` : ""}
                - StartBuy/Buy-in: ${pay}
                </div>
            </td>
            
            <td style="color:#03a9f4;">${earn}</td>
            <td style="color:${profit>=0 ? '#00e676' : '#ff5252'}">
                ${profit>=0?'+':''}${profit}
            </td>
        </tr>
        `;
    }

    html += `
    <div style="">
        💰 ค่าโต๊ะรวม: ${tableFee}<br>
        🎯 ค่าหัวรวม: ${bountyTotal}<br>
        🔥 รวมทั้งหมด: ${tableFee + bountyTotal} (โต๊ะ+ค่าหัว) <br><br>

        🎲 ค่า Dealer: ${dealerTotal} | + Buy-in ${dealer}<br>
        <br>
        <br>
        <br>
    </div>
    `;

    html += `</table>`;
    

    document.getElementById("output").innerHTML = html;
}

// 🔥 SAVE FIX แล้ว
async function saveData() {

    let n = +document.getElementById("players").value;

    let p1 = 0, p2 = 0;
    let names = [];
    let kills = [];
    let prizePool = 0;

    for (let i=1;i<=n;i++) {

        let name = document.getElementById("name"+i).value || ("P"+i);
        let k = +document.getElementById("kill"+i).value || 0;
        let b = +document.getElementById("blind"+i).value || 0;
        let r = document.querySelector(`input[name="rank${i}"]:checked`).value;

        if (r == 1) p1 = i;
        if (r == 2) p2 = i;

        names.push(name);
        kills.push(k);

        prizePool += 200 + (b * 200);
    }

    if (!p1 || !p2) {
        alert("ต้องมี ที่ 1 และ ที่ 2");
        return;
    }

    let first = Math.ceil(prizePool * 0.7);
    let second = prizePool - first;
    let head = 50;

    let session = {
        date: new Date().toISOString(),
        key: "tc", // 🔥 ต้องมี
        players: []
    };

    for (let i = 1; i <= n; i++) {

        let dealer = 20;
        let blindCount = +document.getElementById("blind" + i).value || 0;
        let pay = 270 + (blindCount * 250) + dealer;

        let killMoney = kills[i-1] * 50;
        let earn = killMoney;

        let rank = 0;
        let rankText = "-";

        if (i === p1) {
            earn += first + head;
            rank = 1;
            rankText = "🥇";
        } 
        else if (i === p2) {
            earn += second;
            rank = 2;
            rankText = "🥈";
        }

        let profit = earn - pay;

        session.players.push({
            name: names[i-1].toLowerCase(),
            displayName: names[i-1],
            rank,
            rankText,
            kill: kills[i-1],
            bounty: killMoney,
            blind: blindCount,
            pay,
            earn,
            profit
        });
    }

    try {
        await window.fbAddDoc(
            window.fbCollection(window.db, "sessions"), 
            session
        );

        alert("✅ บันทึกขึ้น Firebase แล้ว!");
    } catch (err) {
        console.error(err);
        alert("❌ ERROR: " + err.message);
    }
}

generatePlayers();



</script>

</body>
</html>
