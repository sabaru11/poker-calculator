<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker Calculator</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

.box {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.player {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    width: 150px;
}

input {
    width: 80%;
    margin: 5px;
}

button {
    padding: 8px 15px;
    margin-top: 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

table {
    margin: auto;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 8px 12px;
}

th {
    background: #222;
}
</style>
</head>

<body>

<h1>🎲 Poker Calculator</h1>

<div class="box" id="players"></div>

<button onclick="calculate()">คำนวณ</button>

<div id="result"></div>

<script>

// ==========================
// 🔧 สร้าง UI ผู้เล่น
// ==========================
for (let i = 1; i <= 7; i++) {

    document.getElementById("players").innerHTML += `
    <div class="player">
        <b>P${i}</b><br>
        <input id="name${i}" placeholder="ชื่อ"><br>
        Kill: <input id="kill${i}" type="number" value="0"><br>
        Blind: <input id="blind${i}" type="number" value="0"><br>

        🥇 <input type="radio" name="rank" id="rank1_${i}">
        🥈 <input type="radio" name="rank" id="rank2_${i}">
    </div>
    `;
}

// ==========================
// 🏆 Rank
// ==========================
function getRank(i) {
    if (document.getElementById("rank1_" + i)?.checked) return 1;
    if (document.getElementById("rank2_" + i)?.checked) return 2;
    return 0;
}

// ==========================
// 🚀 คำนวณ
// ==========================
function calculate() {

    let players = [];

    for (let i = 1; i <= 7; i++) {

        let name = document.getElementById("name" + i).value || "P" + i;
        let kill = Number(document.getElementById("kill" + i).value || 0);
        let blind = Number(document.getElementById("blind" + i).value || 0);
        let rank = getRank(i);

        let startBuy = blind > 0 ? 520 : 270;

        players.push({
            name,
            kill,
            blind,
            rank,
            pay: startBuy,
            earn: 0,
            profit: 0
        });
    }

    // ==========================
    // 🔥 Dealer ใหม่
    // ==========================
    let blindCount = players.filter(p => p.blind > 0).length;

    let dealerBase = 140;
    let dealerExtra = blindCount * 20;
    let dealerTotal = dealerBase + dealerExtra;

    // ==========================
    // 🔥 หักเงินจริง
    // ==========================
    players.forEach(p => {
        if (p.blind > 0) {
            p.pay += 20;
            p.profit -= 20;
        }
    });

    // ==========================
    // 💰 รวมเงิน
    // ==========================
    let totalPot = players.reduce((sum, p) => sum + p.pay, 0);

    let firstPrize = Math.floor(totalPot * 0.7);
    let secondPrize = Math.floor(totalPot * 0.3);

    // ==========================
    // 🏆 แจกเงิน
    // ==========================
    players.forEach(p => {
        if (p.rank === 1) p.earn += firstPrize;
        if (p.rank === 2) p.earn += secondPrize;
    });

    // ==========================
    // 💀 bounty
    // ==========================
    players.forEach(p => {
        p.earn += p.kill * 50;
    });

    // ==========================
    // 📈 profit
    // ==========================
    players.forEach(p => {
        p.profit += p.earn - p.pay;
    });

    render(players, dealerBase, dealerExtra, dealerTotal);
}

// ==========================
// 📺 แสดงผล
// ==========================
function render(players, dealerBase, dealerExtra, dealerTotal) {

    let html = `
    <h2>🏆 สรุปผล</h2>

    <div style="color:#ffd54f;">
        🎲 ค่า Dealer: ${dealerBase} / blind + ${dealerExtra} = ${dealerTotal}
    </div>
    `;

    html += `
    <table>
    <tr>
        <th>Player</th>
        <th>Rank</th>
        <th>Kill</th>
        <th>Blind</th>
        <th>จ่าย</th>
        <th>ได้</th>
        <th>สุทธิ</th>
    </tr>
    `;

    players.forEach(p => {
        html += `
        <tr>
            <td>${p.name}</td>
            <td>${p.rank || '-'}</td>
            <td>${p.kill}</td>
            <td>${p.blind}</td>
            <td>${p.pay}</td>
            <td>${p.earn}</td>
            <td style="color:${p.profit >= 0 ? '#00e676' : '#ff5252'}">
                ${p.profit >= 0 ? '+' : ''}${p.profit}
            </td>
        </tr>
        `;
    });

    html += `</table>`;

    document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
